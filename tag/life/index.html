    <script>
        (function() {
            var htmlClass = document.documentElement.classList;
            setTimeout(function() { htmlClass.remove('not-ready'); }, 10);

            var btnMenu = document.querySelector('.btn-menu');
            if (btnMenu) {
                btnMenu.addEventListener('click', function() { htmlClass.toggle('open'); });
            }

            var metaTheme = document.querySelector('meta[name="theme-color"]');
            var lightBg = '#faf8f1';
            var defaultMode = 'auto';

            function setDark(isDark) {
                if (metaTheme) { metaTheme.setAttribute('content', isDark ? 'rgb(0 0 0 / 85%)' : lightBg); }
                htmlClass[isDark ? 'add' : 'remove']('dark');
                try { localStorage.setItem('dark', isDark); } catch(e) {}
            }

            var darkScheme = window.matchMedia('(prefers-color-scheme: dark)');
            var stored = null;
            try { stored = localStorage.getItem('dark'); } catch(e) {}
            if (stored === 'true' || stored === 'false') {
                setDark(stored === 'true');
            } else if (defaultMode === 'dark') {
                setDark(true);
            } else if (defaultMode === 'light') {
                setDark(false);
            } else {
                setDark(darkScheme.matches);
            }

            darkScheme.addEventListener('change', function(event) { setDark(event.matches); });

            var btnDark = document.querySelector('.btn-dark');
            if (btnDark) {
                btnDark.addEventListener('click', function() {
                    var cur = null;
                    try { cur = localStorage.getItem('dark'); } catch(e) {}
                    setDark(cur !== 'true');
                });
            }
        })();
    </script>
